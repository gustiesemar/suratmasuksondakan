<!doctype html>
<html lang="id">
  <head>
    <script>
        const akses = localStorage.getItem('hakAksesKelurahan');
        if (!akses) {
            window.location.href = 'login.html'; // Kalau belum login, lempar ke depan
        } else if (akses !== 'superadmin') {
            alert("⛔ AKSES DITOLAK! Halaman ini khusus Super Admin (Lurah).");
            window.location.href = 'monitoring.html'; // Usir ke halaman monitoring
        }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disposisi Surat - Sistem Kelurahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">
   <nav class="bg-blue-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <img src="logo_kelurahan.png" alt="Logo Kelurahan Sondakan" class="h-10 w-10 rounded-full border border-white/50 object-cover shadow-inner">
            <div class="text-lg md:text-xl font-bold text-white">
                E-DISON
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="text-xs md:text-sm bg-indigo-500 text-white font-bold px-3 py-1.5 rounded-full border border-indigo-400 hidden md:block">
                👁️ Mode: Viewer / Monitoring
            </div>
            <button onclick="keluarSistem()" class="text-xs md:text-sm bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-full font-bold shadow-md transition">
                Keluar 🚪
            </button>
        </div>
    </nav>

    <div class="flex flex-1 flex-col md:flex-row">
      <aside
        class="w-full md:w-64 bg-white shadow-sm border-r border-slate-200 p-4 flex flex-row md:flex-col gap-2 overflow-x-auto"
      >
        <a
          href="index.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition"
        >
          📥 Input Surat Masuk
        </a>
        <a
          href="daftar-surat.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition"
        >
          📂 Daftar Surat
        </a>
        <a
          href="monitoring.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition"
        >
          📊 Monitoring Arsip
        </a>
        <a
          href="#"
          class="bg-blue-50 text-blue-700 font-semibold p-3 rounded-lg block whitespace-nowrap border border-blue-100 transition mt-2"
        >
          📝 Lembar Disposisi
        </a>
      </aside>

      <main class="flex-1 p-4 md:p-8">
        <div class="max-w-4xl mx-auto flex flex-col lg:flex-row gap-6">
          <div
            class="flex-1 bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit"
          >
            <div class="flex items-center justify-between border-b pb-3 mb-4">
              <h2 class="text-xl font-bold text-slate-800">Detail Surat</h2>
              <span
                id="badgeJenisSurat"
                class="px-3 py-1 rounded-full text-xs font-bold border"
              >
                Loading...
              </span>
            </div>
            <div class="space-y-4 text-sm md:text-base" id="wadahDetailSurat">
              <p class="text-slate-500 italic">
                Sedang mengambil data surat...
              </p>
            </div>
          </div>

          <div
            class="flex-1 bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-t-4 border-t-amber-500 h-fit"
            id="wadahFormDisposisi"
          >
            <h2 class="text-xl font-bold text-slate-800 mb-1">
              Tindak Lanjut (Disposisi)
            </h2>
            <p class="text-slate-500 text-sm mb-6 border-b pb-4">
              Instruksi Lurah kepada pejabat terkait.
            </p>

            <form id="formDisposisi" class="space-y-5">
              <input type="hidden" id="idSuratTersembunyi" />

              <div>
    <label class="block text-sm font-semibold text-slate-700 mb-2">Teruskan / Disposisi Kepada:</label>
    <div id="wadahCheckboxPejabat" class="space-y-2 bg-slate-50 p-3 rounded-lg border border-slate-200">
        <p class="text-sm text-slate-500">⏳ Sedang memuat daftar pejabat...</p>
    </div>
</div>
                
                </div>
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Isi Disposisi / Instruksi</label
                >
                <textarea
                  id="isiDisposisi"
                  class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-amber-500 bg-slate-50"
                  rows="4"
                  placeholder="Instruksi..."
                  required
                ></textarea>
              </div>

              <div class="pt-2">
                <button
                  type="submit"
                  id="btnSubmitDisposisi"
                  class="w-full bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-emerald-700 transition-all shadow-md flex justify-center items-center gap-2"
                >
                  Simpan Disposisi
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // MASUKKAN URL DAN API KEY KAMU DI SINI
       const supabaseUrl = "https://gfxqowoohdccbwfubbwn.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmeHFvd29vaGRjY2J3ZnViYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDc2OTgsImV4cCI6MjA4OTk4MzY5OH0.kkVVDqkSVr6mhoz5oIhObFpbsGILtfwL2Jkv0pcW1ow";
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const suratId = urlParams.get('id');
        let dataSuratGlobal = null;
        
        // VARIABEL BARU: Menyimpan data pejabat dari database
        let databasePejabat = {};

        function formatTanggalIndo(tanggalString) {
            if (!tanggalString) return '-';
            return new Date(tanggalString).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        async function loadDetailSurat() {
            if (!suratId) {
                document.getElementById('wadahDetailSurat').innerHTML = '<p class="text-red-500">Error: Surat tidak ditemukan.</p>';
                return;
            }

            try {
                // 1. Muat Detail Surat
                const { data: surat, error: errSurat } = await supabaseClient.from('surat').select('*').eq('id', suratId).single();
                if (errSurat) throw errSurat;
                
                dataSuratGlobal = surat;
                document.getElementById('idSuratTersembunyi').value = surat.id;

                const badge = document.getElementById('badgeJenisSurat');
                badge.className = surat.jenis_surat === 'undangan' ? "bg-amber-100 text-amber-800 px-3 py-1 rounded-full text-xs font-bold border" : "bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold border";
                badge.innerText = surat.jenis_surat === 'undangan' ? "Undangan" : "Biasa";

                let detailHTML = `
                    <div><p class="text-slate-500 text-sm">Asal Surat</p><p class="font-semibold">${surat.asal_surat}</p></div>
                    <div><p class="text-slate-500 text-sm">Tanggal Masuk</p><p class="font-semibold">${formatTanggalIndo(surat.tgl_masuk)}</p></div>
                    <div><p class="text-slate-500 text-sm">Perihal</p><p class="font-semibold">${surat.perihal}</p></div>
                `;
                if (surat.link_gdrive) {
                    detailHTML += `<div class="mt-4 pt-4 border-t"><a href="${surat.link_gdrive}" target="_blank" class="text-red-700 bg-red-100 px-4 py-2 rounded-lg text-sm font-semibold">📄 Lihat File (PDF)</a></div>`;
                }
                if (surat.jenis_surat === 'undangan') {
                    detailHTML += `
                        <div class="bg-blue-50 p-4 rounded-lg mt-4 text-sm">
                            <p class="font-bold text-blue-800 mb-2 border-b border-blue-200 pb-1">Jadwal Rapat</p>
                            <p><span class="text-blue-600 text-xs">Tanggal:</span> ${formatTanggalIndo(surat.tgl_rapat)}</p>
                            <p><span class="text-blue-600 text-xs">Pukul:</span> ${surat.jam_rapat || '-'}</p>
                            <p><span class="text-blue-600 text-xs">Tempat:</span> ${surat.tempat_rapat || '-'}</p>
                        </div>
                    `;
                }
                document.getElementById('wadahDetailSurat').innerHTML = detailHTML;

                // 2. MUAT DAFTAR PEJABAT SECARA DINAMIS DARI DATABASE
                const { data: listPejabat, error: errPejabat } = await supabaseClient.from('users').select('*').eq('role', 'admin');
                if (errPejabat) throw errPejabat;

                const wadahCheckbox = document.getElementById('wadahCheckboxPejabat');
                wadahCheckbox.innerHTML = ''; // Kosongkan tulisan loading

                listPejabat.forEach(p => {
                    // Simpan ke variabel global untuk dipakai saat bikin tombol WA nanti
                    databasePejabat[p.id] = { nama: p.nama, wa: p.no_wa };
                    
                    // Buat checkbox secara otomatis
                    wadahCheckbox.innerHTML += `
                        <label class="flex items-center gap-2 cursor-pointer p-1 hover:bg-slate-100 rounded">
                            <input type="checkbox" name="pejabat" value="${p.id}" class="w-4 h-4 text-amber-500 rounded focus:ring-amber-500">
                            <span class="text-slate-700 font-medium text-sm">${p.jabatan} <span class="text-slate-400 font-normal">(${p.nama})</span></span>
                        </label>
                    `;
                });

            } catch (err) {
                document.getElementById('wadahDetailSurat').innerHTML = '<p class="text-red-500">Gagal memuat data.</p>';
            }
        }

        document.getElementById('formDisposisi').addEventListener('submit', async function(event) {
            event.preventDefault();
            const btnSubmit = document.getElementById('btnSubmitDisposisi');
            btnSubmit.innerHTML = '⏳ Menyimpan...'; btnSubmit.disabled = true;

            const idSurat = document.getElementById('idSuratTersembunyi').value;
            const isi = document.getElementById('isiDisposisi').value;
            const checkboxes = document.querySelectorAll('input[name="pejabat"]:checked');
            
            if (checkboxes.length === 0) {
                alert("Pilih minimal 1 pejabat tujuan disposisi!");
                btnSubmit.innerHTML = 'Simpan Disposisi'; btnSubmit.disabled = false; return;
            }

            try {
                const dataDisposisi = Array.from(checkboxes).map(cb => ({ surat_id: idSurat, pejabat_id: cb.value, isi_disposisi: isi }));
                const { error } = await supabaseClient.from('disposisi').insert(dataDisposisi);
                if (error) throw error;

                let htmlTombolWA = `
                    <div class="bg-emerald-50 border border-emerald-200 p-5 rounded-lg text-center mt-2">
                        <div class="text-4xl mb-2">✅</div>
                        <h3 class="font-bold text-emerald-800 text-lg mb-1">Disposisi Tersimpan!</h3>
                        <div class="flex flex-col gap-3">
                `;

                Array.from(checkboxes).forEach(cb => {
                    // SEKARANG MENGAMBIL WA DARI DATABASE
                    const infoPejabat = databasePejabat[cb.value]; 
                    
                    let teksPesan = `*DISPOSISI SURAT BARU*  Halo ${infoPejabat.nama}, ada instruksi disposisi baru dari Bapak Lurah.`;
                    teksPesan += ` *Asal Surat:  * ${dataSuratGlobal.asal_surat}`;
                    teksPesan += ` *Perihal: * ${dataSuratGlobal.perihal}`;
                    if (dataSuratGlobal.link_gdrive) teksPesan += `*Link File:* ${dataSuratGlobal.link_gdrive}\\n`;
                    teksPesan += ` *disposisi Lurah: *_"${isi}"_  Mohon segera ditindaklanjuti.`;

                    const urlWA = `https://wa.me/${infoPejabat.wa}?text=${encodeURIComponent(teksPesan)}`;
                    htmlTombolWA += `<a href="${urlWA}" target="_blank" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center shadow-md">Kirim WA ke ${infoPejabat.nama}</a>`;
                });

                htmlTombolWA += `<button onclick="location.href='daftar-surat.html'" class="mt-4 text-slate-500 underline text-sm hover:text-slate-700">Kembali ke Daftar Surat</button></div></div>`;
                document.getElementById('wadahFormDisposisi').innerHTML = htmlTombolWA;
            } catch (err) {
                alert("Gagal menyimpan disposisi.");
                btnSubmit.innerHTML = 'Simpan Disposisi'; btnSubmit.disabled = false;
            }
        });

        window.onload = loadDetailSurat;
    </script>
    <script>
        function keluarSistem() {
            localStorage.removeItem('hakAksesKelurahan');
            window.location.href = 'login.html';
        }
    </script>
  </body>
</html>
