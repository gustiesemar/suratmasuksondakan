<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Kelurahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg border border-slate-200 w-full max-w-sm">
        <div class="text-center mb-6 flex flex-col items-center">
            <img src="logo_kelurahan.png" alt="Logo Kelurahan Sondakan" class="h-24 w-24 rounded-full border-4 border-slate-200 mb-3 object-cover shadow-inner">
            <h1 class="text-2xl font-bold text-slate-800">E-DISON</h1>
             <h3 class="text-2xl font-bold text-slate-600">E-DISPOSISI KELURAHAN SONDAKAN</h3>
            <p class="text-slate-500 text-sm">Silakan login untuk melanjutkan</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Masuk Sebagai:</label>
                <select id="pilihanRole" onchange="aturKotakPassword()" class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50">
                    <option value="viewer">👁️ Viewer (Hanya Pantau)</option>
                    <option value="admin">👤 Admin (Staff Input)</option>
                    <option value="superadmin">👑 Super Admin (Lurah)</option>
                </select>
            </div>

            <div id="wadahPassword">
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password:</label>
                <input type="password" id="inputPassword" placeholder="Masukkan password rahasia..." class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50">
            </div>

            <button onclick="prosesLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition mt-2">
                Masuk ke Sistem ➡️
            </button>
        </div>
    </div>

    <script>
        function aturKotakPassword() {
            const roleDipilih = document.getElementById('pilihanRole').value;
            const wadahPassword = document.getElementById('wadahPassword');
            if (roleDipilih === 'viewer') { wadahPassword.style.display = 'none'; } 
            else { wadahPassword.style.display = 'block'; }
        }

        function prosesLogin() {
            const roleDipilih = document.getElementById('pilihanRole').value;
            const passwordDiketik = document.getElementById('inputPassword').value;

            if (roleDipilih === 'viewer') {
                localStorage.setItem('hakAksesKelurahan', roleDipilih);
                window.location.href = 'monitoring.html';
                return;
            }

            const passwordBenar = {
                "superadmin": "lurah123",
                "admin": "admin123"
            };

            if (passwordDiketik === "") { alert("⚠️ Password tidak boleh kosong!"); return; }

            if (passwordDiketik === passwordBenar[roleDipilih]) {
                localStorage.setItem('hakAksesKelurahan', roleDipilih);
                if (roleDipilih === 'superadmin') { window.location.href = 'daftar-surat.html'; } 
                else if (roleDipilih === 'admin') { window.location.href = 'index.html'; }
            } else {
                alert("❌ LOGIN GAGAL! Password yang Anda masukkan salah.");
                document.getElementById('inputPassword').value = '';
            }
        }
        window.onload = aturKotakPassword;
    </script>
</body>
</html>
