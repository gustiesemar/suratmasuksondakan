<!doctype html>
<html lang="id">
  <head>
    <script>
      const akses = localStorage.getItem("hakAksesKelurahan");
      if (!akses) {
        window.location.href = "login.html";
      } else if (akses === "viewer") {
        alert(
          "⛔ AKSES DITOLAK! Viewer hanya diizinkan melihat halaman Monitoring Arsip.",
        );
        window.location.href = "monitoring.html";
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Surat - Sistem Kelurahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">
    <nav
      class="bg-blue-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10"
    >
      <div class="text-lg md:text-xl font-bold flex items-center gap-2">
        <span>🏛️</span> E-Surat Kelurahan
      </div>
      <div
        class="text-xs md:text-sm bg-orange-500 text-white px-3 py-1.5 rounded-full border border-orange-400 font-bold"
      >
        ✏️ Mode: Edit Data
      </div>
    </nav>

    <div class="flex flex-1 flex-col md:flex-row">
      <aside
        class="w-full md:w-64 bg-white shadow-sm border-r border-slate-200 p-4 flex flex-row md:flex-col gap-2 overflow-x-auto"
      >
        <a
          href="index.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition"
        >
          📥 Input Surat Masuk
        </a>
        <a
          href="daftar-surat.html"
          class="bg-blue-50 text-blue-700 font-semibold p-3 rounded-lg block whitespace-nowrap border border-blue-100 transition"
        >
          📂 Daftar Surat
        </a>
      </aside>

      <main class="flex-1 p-4 md:p-8">
        <div
          class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-slate-200 border-t-4 border-t-orange-500"
        >
          <div class="flex justify-between items-center mb-1">
            <h2 class="text-2xl font-bold text-slate-800">Edit Surat Masuk</h2>
            <a
              href="daftar-surat.html"
              class="text-sm text-blue-600 hover:underline"
              >← Batal & Kembali</a
            >
          </div>
          <p class="text-slate-500 mb-6 pb-4 border-b text-sm md:text-base">
            Perbaiki data surat yang keliru di bawah ini.
          </p>

          <form id="formEditSurat" class="space-y-5">
            <input type="hidden" id="idSuratTersembunyi" />

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Jenis Surat</label
                >
                <select
                  id="jenisSurat"
                  class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-orange-500 bg-slate-50"
                  onchange="toggleUndanganFields()"
                >
                  <option value="biasa">Surat Biasa</option>
                  <option value="undangan">Surat Undangan</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Tanggal Surat Masuk</label
                >
                <input
                  type="date"
                  id="tglMasuk"
                  class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-orange-500 bg-slate-50"
                  required
                />
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1"
                >Asal Surat</label
              >
              <input
                type="text"
                id="asalSurat"
                class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-orange-500 bg-slate-50"
                required
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1"
                >Perihal Surat</label
              >
              <textarea
                id="perihal"
                class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-orange-500 bg-slate-50"
                rows="3"
                required
              ></textarea>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1"
                >Link Google Drive (File PDF)</label
              >
              <input
                type="url"
                id="linkGdrive"
                placeholder="Contoh: https://drive.google.com/file/d/..."
                class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-orange-500 bg-slate-50"
              />
            </div>

            <div
              id="fieldUndangan"
              class="hidden bg-orange-50 p-5 rounded-lg border border-orange-200 mt-6 transition-all"
            >
              <h3
                class="font-bold text-orange-800 mb-4 flex items-center gap-2"
              >
                <span>📅</span> Detail Jadwal Undangan
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label
                    class="block text-sm font-semibold text-orange-900 mb-1"
                    >Tanggal Rapat</label
                  >
                  <input
                    type="date"
                    id="tglRapat"
                    class="w-full border border-orange-300 p-2.5 rounded-lg focus:ring-2 focus:ring-orange-500"
                  />
                </div>
                <div>
                  <label
                    class="block text-sm font-semibold text-orange-900 mb-1"
                    >Jam Rapat</label
                  >
                  <input
                    type="time"
                    id="jamRapat"
                    class="w-full border border-orange-300 p-2.5 rounded-lg focus:ring-2 focus:ring-orange-500"
                  />
                </div>
                <div class="md:col-span-2">
                  <label
                    class="block text-sm font-semibold text-orange-900 mb-1"
                    >Tempat Rapat</label
                  >
                  <input
                    type="text"
                    id="tempatRapat"
                    class="w-full border border-orange-300 p-2.5 rounded-lg focus:ring-2 focus:ring-orange-500"
                  />
                </div>
              </div>
            </div>

            <div class="pt-4">
              <button
                type="submit"
                id="btnSubmit"
                class="w-full bg-orange-500 text-white font-bold py-3 px-4 rounded-lg hover:bg-orange-600 transition-all shadow-md"
              >
                Simpan Perubahan
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // 1. MASUKKAN URL DAN API KEY KAMU DI SINI
      const supabaseUrl = "https://gfxqowoohdccbwfubbwn.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmeHFvd29vaGRjY2J3ZnViYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDc2OTgsImV4cCI6MjA4OTk4MzY5OH0.kkVVDqkSVr6mhoz5oIhObFpbsGILtfwL2Jkv0pcW1ow";
      const supabaseClient = window.supabase.createClient(
        supabaseUrl,
        supabaseKey,
      );

      const urlParams = new URLSearchParams(window.location.search);
      const suratId = urlParams.get("id");

      function toggleUndanganFields() {
        const jenis = document.getElementById("jenisSurat").value;
        const fieldUndangan = document.getElementById("fieldUndangan");
        if (jenis === "undangan") {
          fieldUndangan.classList.remove("hidden");
        } else {
          fieldUndangan.classList.add("hidden");
          document.getElementById("tglRapat").value = "";
          document.getElementById("jamRapat").value = "";
          document.getElementById("tempatRapat").value = "";
        }
      }

      // FUNGSI: Mengambil data lama untuk dimasukkan ke form
      async function loadDataLama() {
        if (!suratId) {
          alert("Surat tidak ditemukan!");
          window.location.href = "daftar-surat.html";
          return;
        }

        try {
          const { data, error } = await supabaseClient
            .from("surat")
            .select("*")
            .eq("id", suratId)
            .single();

          if (error) throw error;

          // Memasukkan data dari database ke kotak input
          document.getElementById("idSuratTersembunyi").value = data.id;
          document.getElementById("jenisSurat").value = data.jenis_surat;
          document.getElementById("tglMasuk").value = data.tgl_masuk;
          document.getElementById("asalSurat").value = data.asal_surat;
          document.getElementById("perihal").value = data.perihal;
          document.getElementById("linkGdrive").value = data.link_gdrive || "";

          if (data.jenis_surat === "undangan") {
            document.getElementById("tglRapat").value = data.tgl_rapat || "";
            document.getElementById("jamRapat").value = data.jam_rapat || "";
            document.getElementById("tempatRapat").value =
              data.tempat_rapat || "";
          }

          toggleUndanganFields(); // Perbarui tampilan kotak undangan
        } catch (err) {
          console.error("Gagal memuat data lama:", err);
          alert("Gagal memuat data surat.");
        }
      }

      // FUNGSI: Menyimpan perubahan (UPDATE, bukan INSERT)
      document
        .getElementById("formEditSurat")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const btnSubmit = document.getElementById("btnSubmit");
          btnSubmit.innerHTML = "⏳ Memperbarui...";
          btnSubmit.disabled = true;

          const id = document.getElementById("idSuratTersembunyi").value;
          const jenis = document.getElementById("jenisSurat").value;
          const tglMasuk = document.getElementById("tglMasuk").value;
          const asal = document.getElementById("asalSurat").value;
          const perihal = document.getElementById("perihal").value;
          const linkGdrive =
            document.getElementById("linkGdrive").value || null;

          let tglRapat = null,
            jamRapat = null,
            tempatRapat = null;
          if (jenis === "undangan") {
            tglRapat = document.getElementById("tglRapat").value || null;
            jamRapat = document.getElementById("jamRapat").value || null;
            tempatRapat = document.getElementById("tempatRapat").value || null;
          }

          try {
            // Menggunakan .update() untuk menimpa data berdasarkan id
            const { error } = await supabaseClient
              .from("surat")
              .update({
                jenis_surat: jenis,
                tgl_masuk: tglMasuk,
                asal_surat: asal,
                perihal: perihal,
                link_gdrive: linkGdrive,
                tgl_rapat: tglRapat,
                jam_rapat: jamRapat,
                tempat_rapat: tempatRapat,
              })
              .eq("id", id); // Sangat penting! Hanya update surat dengan ID ini

            if (error) throw error;

            alert("Perubahan berhasil disimpan! 🚀");
            window.location.href = "daftar-surat.html"; // Pindah kembali ke daftar
          } catch (err) {
            console.error("Error Sistem:", err);
            alert("Gagal memperbarui data. Cek koneksimu.");
            btnSubmit.innerHTML = "Simpan Perubahan";
            btnSubmit.disabled = false;
          }
        });

      // Jalankan saat halaman dibuka
      window.onload = loadDataLama;
    </script>
  </body>
</html>
