<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengaturan Pejabat - Sistem Kelurahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">
   <nav class="bg-blue-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <img src="logo_kelurahan.png" alt="Logo Kelurahan Sondakan" class="h-10 w-10 rounded-full border border-white/50 object-cover shadow-inner">
            <div class="text-lg md:text-xl font-bold text-white">
                E-Surat Kelurahan
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="text-xs md:text-sm bg-indigo-500 text-white font-bold px-3 py-1.5 rounded-full border border-indigo-400 hidden md:block">
                👁️ Mode: Viewer / Monitoring
            </div>
            <button onclick="keluarSistem()" class="text-xs md:text-sm bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-full font-bold shadow-md transition">
                Keluar 🚪
            </button>
        </div>
    </nav>
    <div class="flex flex-1 flex-col md:flex-row">
      <aside
        class="w-full md:w-64 bg-white shadow-sm border-r border-slate-200 p-4 flex flex-row md:flex-col gap-2 overflow-x-auto"
      >
        <a
          href="index.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition"
          >📥 Input Surat Masuk</a
        >
        <a
          href="daftar-surat.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition"
          >📂 Daftar Surat</a
        >
        <a
          href="monitoring.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition"
          >📊 Monitoring Arsip</a
        >
        <a
          href="#"
          class="bg-blue-50 text-blue-700 font-semibold p-3 rounded-lg block whitespace-nowrap border border-blue-100 transition mt-4"
          >⚙️ Pengaturan Pejabat</a
        >
      </aside>

      <main class="flex-1 p-4 md:p-8">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-6">
          <div
            class="w-full md:w-1/3 bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit"
          >
            <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">
              Edit Data Pejabat
            </h2>

            <form id="formEditPejabat" class="space-y-4">
              <input type="hidden" id="editId" />

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Jabatan</label
                >
                <input
                  type="text"
                  id="editJabatan"
                  readonly
                  class="w-full border border-slate-300 p-2 rounded bg-slate-100 text-slate-500 cursor-not-allowed text-sm"
                />
                <span class="text-xs text-slate-400"
                  >Jabatan tidak bisa diubah.</span
                >
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Nama Lengkap Pejabat</label
                >
                <input
                  type="text"
                  id="editNama"
                  required
                  class="w-full border border-slate-300 p-2 rounded focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm"
                />
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Nomor WhatsApp</label
                >
                <input
                  type="text"
                  id="editWa"
                  required
                  placeholder="Contoh: 628123456789"
                  class="w-full border border-slate-300 p-2 rounded focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm"
                />
                <span class="text-xs text-slate-400"
                  >Awali dengan 62 (tanpa 0, tanpa spasi).</span
                >
              </div>

              <button
                type="submit"
                id="btnSimpan"
                disabled
                class="w-full bg-slate-400 text-white font-bold py-2 px-4 rounded transition mt-2"
              >
                Pilih Pejabat di Tabel ➡️
              </button>
            </form>
          </div>

          <div
            class="w-full md:w-2/3 bg-white p-6 rounded-xl shadow-sm border border-slate-200"
          >
            <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">
              Daftar Pejabat Kelurahan
            </h2>

            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="bg-slate-100 text-slate-600 text-sm">
                    <th class="p-3 border-b">Jabatan</th>
                    <th class="p-3 border-b">Nama Pejabat</th>
                    <th class="p-3 border-b">No. WhatsApp</th>
                    <th class="p-3 border-b text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody
                  id="tabelPejabat"
                  class="text-sm divide-y divide-slate-100"
                >
                  <tr>
                    <td colspan="4" class="p-4 text-center">
                      ⏳ Memuat data...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // 1. MASUKKAN URL DAN API KEY KAMU DI SINI
      const supabaseUrl = "https://gfxqowoohdccbwfubbwn.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmeHFvd29vaGRjY2J3ZnViYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDc2OTgsImV4cCI6MjA4OTk4MzY5OH0.kkVVDqkSVr6mhoz5oIhObFpbsGILtfwL2Jkv0pcW1ow";

      const supabaseClient = window.supabase.createClient(
        supabaseUrl,
        supabaseKey,
      );

      async function loadPejabat() {
        const wadahTabel = document.getElementById("tabelPejabat");
        try {
          // Ambil data dari tabel users, khusus yang role-nya 'admin'
          const { data, error } = await supabaseClient
            .from("users")
            .select("*")
            .eq("role", "admin")
            .order("id", { ascending: true });

          if (error) throw error;
          wadahTabel.innerHTML = "";

          data.forEach((pejabat) => {
            wadahTabel.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-3 font-semibold text-slate-700">${pejabat.jabatan}</td>
                            <td class="p-3">${pejabat.nama}</td>
                            <td class="p-3 text-emerald-600 font-medium">WA: ${pejabat.no_wa}</td>
                            <td class="p-3 text-center">
                                <button onclick="siapkanEdit('${pejabat.id}', '${pejabat.nama}', '${pejabat.jabatan}', '${pejabat.no_wa}')" 
                                        class="bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1 rounded text-xs font-bold transition">
                                    ✏️ Edit
                                </button>
                            </td>
                        </tr>
                    `;
          });
        } catch (err) {
          wadahTabel.innerHTML = `<tr><td colspan="4" class="text-center text-red-500 p-4">Gagal memuat data.</td></tr>`;
        }
      }

      // Fungsi saat tombol Edit diklik (mengisi form di sebelah kiri)
      function siapkanEdit(id, nama, jabatan, wa) {
        document.getElementById("editId").value = id;
        document.getElementById("editJabatan").value = jabatan;
        document.getElementById("editNama").value = nama;
        document.getElementById("editWa").value = wa;

        // Aktifkan tombol simpan
        const btn = document.getElementById("btnSimpan");
        btn.disabled = false;
        btn.className =
          "w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition mt-2";
        btn.innerHTML = "💾 Simpan Perubahan";
      }

      // Fungsi saat form disubmit (UPDATE ke database)
      document
        .getElementById("formEditPejabat")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const btn = document.getElementById("btnSimpan");
          btn.innerHTML = "⏳ Menyimpan...";
          btn.disabled = true;

          const id = document.getElementById("editId").value;
          const namaBaru = document.getElementById("editNama").value;
          const waBaru = document.getElementById("editWa").value;

          try {
            const { error } = await supabaseClient
              .from("users")
              .update({ nama: namaBaru, no_wa: waBaru })
              .eq("id", id);

            if (error) throw error;

            alert("Data Pejabat berhasil diperbarui! ✅");
            document.getElementById("formEditPejabat").reset();
            btn.disabled = true;
            btn.className =
              "w-full bg-slate-400 text-white font-bold py-2 px-4 rounded transition mt-2";
            btn.innerHTML = "Pilih Pejabat di Tabel ➡️";

            loadPejabat(); // Refresh tabel otomatis
          } catch (err) {
            alert("Gagal memperbarui data.");
            btn.innerHTML = "💾 Simpan Perubahan";
            btn.disabled = false;
          }
        });

      window.onload = loadPejabat;
    </script>
    <script>
        function keluarSistem() {
            localStorage.removeItem('hakAksesKelurahan');
            window.location.href = 'login.html';
        }
    </script>
  </body>
</html>
