<!doctype html>
<html lang="id">
  <head>
    <script>
      const akses = localStorage.getItem("hakAksesKelurahan");
      if (!akses) {
        window.location.href = "login.html";
      } else if (akses === "viewer") {
        alert(
          "⛔ AKSES DITOLAK! Viewer hanya diizinkan melihat halaman Monitoring Arsip.",
        );
        window.location.href = "monitoring.html";
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-DISON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">
   <nav class="bg-blue-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <img src="logo_kelurahan.png" alt="Logo Kelurahan Sondakan" class="h-10 w-10 rounded-full border border-white/50 object-cover shadow-inner">
            <div class="text-lg md:text-xl font-bold text-white">
                E-DISON
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="text-xs md:text-sm bg-indigo-500 text-white font-bold px-3 py-1.5 rounded-full border border-indigo-400 hidden md:block">
                👁️ Mode: Viewer / Monitoring
            </div>
            <button onclick="keluarSistem()" class="text-xs md:text-sm bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-full font-bold shadow-md transition">
                Keluar 🚪
            </button>
        </div>
    </nav>

    <div class="flex flex-1 flex-col md:flex-row">
      <aside
        class="w-full md:w-64 bg-white shadow-sm border-r border-slate-200 p-4 flex flex-row md:flex-col gap-2 overflow-x-auto"
      >
        <a
          href="#"
          class="bg-blue-50 text-blue-700 font-semibold p-3 rounded-lg block whitespace-nowrap border border-blue-100"
        >
          📥 Input Surat Masuk
        </a>
        <a
          href="daftar-surat.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap"
        >
          📂 Daftar Surat
        </a>
        <a
          href="monitoring.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition"
        >
          📊 Monitoring Arsip
        </a>
        <a
          href="pengaturan.html"
          class="text-slate-600 hover:bg-slate-50 hover:text-blue-600 p-3 rounded-lg block whitespace-nowrap transition mt-4 border-t border-slate-200 pt-4"
        >
          ⚙️ Pengaturan Pejabat
        </a>
      </aside>

      <main class="flex-1 p-4 md:p-8">
        <div
          class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-slate-200"
        >
          <h2 class="text-2xl font-bold text-slate-800 mb-1">
            Form Surat Masuk
          </h2>
          <p class="text-slate-500 mb-6 pb-4 border-b text-sm md:text-base">
            Silakan catat detail surat yang diterima oleh Kelurahan hari ini.
          </p>

          <form id="formSurat" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Jenis Surat</label
                >
                <select
                  id="jenisSurat"
                  class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50"
                  onchange="toggleUndanganFields()"
                >
                  <option value="biasa">Surat Biasa</option>
                  <option value="undangan">Surat Undangan</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Tanggal Surat Masuk</label
                >
                <input
                  type="date"
                  id="tglMasuk"
                  class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50"
                  required
                />
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1"
                >Asal Surat</label
              >
              <input
                type="text"
                id="asalSurat"
                class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50"
                required
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1"
                >Perihal Surat</label
              >
              <textarea
                id="perihal"
                class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50"
                rows="3"
                required
              ></textarea>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1"
                >Link Google Drive (File PDF) -
                <span class="text-slate-400 font-normal">Opsional</span></label
              >
              <input
                type="url"
                id="linkGdrive"
                placeholder="Contoh: https://drive.google.com/file/d/..."
                class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50"
              />
            </div>

            <div
              id="fieldUndangan"
              class="hidden bg-blue-50 p-5 rounded-lg border border-blue-200 mt-6 transition-all"
            >
              <h3 class="font-bold text-blue-800 mb-4 flex items-center gap-2">
                <span>📅</span> Detail Jadwal Undangan
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-semibold text-blue-900 mb-1"
                    >Tanggal Rapat</label
                  >
                  <input
                    type="date"
                    id="tglRapat"
                    class="w-full border border-blue-300 p-2.5 rounded-lg"
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-blue-900 mb-1"
                    >Jam Rapat</label
                  >
                  <input
                    type="time"
                    id="jamRapat"
                    class="w-full border border-blue-300 p-2.5 rounded-lg"
                  />
                </div>
                <div class="md:col-span-2">
                  <label class="block text-sm font-semibold text-blue-900 mb-1"
                    >Tempat Rapat</label
                  >
                  <input
                    type="text"
                    id="tempatRapat"
                    class="w-full border border-blue-300 p-2.5 rounded-lg"
                  />
                </div>
              </div>
            </div>

            <div class="pt-4">
              <button
                type="submit"
                id="btnSubmit"
                class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition-all shadow-md"
              >
                Simpan Data Surat
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // 1. URL dan API Key (Sudah benar!)
      const supabaseUrl = "https://gfxqowoohdccbwfubbwn.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmeHFvd29vaGRjY2J3ZnViYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDc2OTgsImV4cCI6MjA4OTk4MzY5OH0.kkVVDqkSVr6mhoz5oIhObFpbsGILtfwL2Jkv0pcW1ow";

      // 2. Inisialisasi Supabase (KITA GANTI NAMANYA JADI supabaseClient AGAR TIDAK BENTROK)
      const supabaseClient = window.supabase.createClient(
        supabaseUrl,
        supabaseKey,
      );

      function toggleUndanganFields() {
        const jenis = document.getElementById("jenisSurat").value;
        const fieldUndangan = document.getElementById("fieldUndangan");
        if (jenis === "undangan") {
          fieldUndangan.classList.remove("hidden");
        } else {
          fieldUndangan.classList.add("hidden");
          document.getElementById("tglRapat").value = "";
          document.getElementById("jamRapat").value = "";
          document.getElementById("tempatRapat").value = "";
        }
      }

      document
        .getElementById("formSurat")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const btnSubmit = document.getElementById("btnSubmit");
          const teksAsli = btnSubmit.innerHTML;
          btnSubmit.innerHTML = "⏳ Menyimpan...";
          btnSubmit.disabled = true;

          const jenis = document.getElementById("jenisSurat").value;
          const tglMasuk = document.getElementById("tglMasuk").value;
          const asal = document.getElementById("asalSurat").value;
          const perihal = document.getElementById("perihal").value;

          // Mengambil nilai link gdrive
          const linkGdrive =
            document.getElementById("linkGdrive").value || null;

          let tglRapat = null,
            jamRapat = null,
            tempatRapat = null;

          if (jenis === "undangan") {
            tglRapat = document.getElementById("tglRapat").value || null;
            jamRapat = document.getElementById("jamRapat").value || null;
            tempatRapat = document.getElementById("tempatRapat").value || null;
          }

          try {
            // Mengirim ke tabel 'surat' termasuk link_gdrive
            const { data, error } = await supabaseClient.from("surat").insert([
              {
                jenis_surat: jenis,
                tgl_masuk: tglMasuk,
                asal_surat: asal,
                perihal: perihal,
                link_gdrive: linkGdrive, // <--- Data baru dikirim
                tgl_rapat: tglRapat,
                jam_rapat: jamRapat,
                tempat_rapat: tempatRapat,
              },
            ]);

            if (error) {
              console.error("Error dari Supabase:", error.message);
              alert("Gagal menyimpan: " + error.message);
            } else {
              alert("Yeay! Surat berhasil disimpan ke database. 🚀");
              document.getElementById("formSurat").reset();
              toggleUndanganFields();
            }
          } catch (err) {
            console.error("Error Sistem:", err);
            alert("Terjadi kesalahan sistem. Coba cek kembali.");
          }

          btnSubmit.innerHTML = teksAsli;
          btnSubmit.disabled = false;
        });
    </script>
    <script>
      // Fungsi untuk Logout
      function keluarSistem() {
        // 1. Buang "Kartu Tanda Pengenal" dari sistem
        localStorage.removeItem("hakAksesKelurahan");

        // 2. Lemparkan pengguna kembali ke halaman Login
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
